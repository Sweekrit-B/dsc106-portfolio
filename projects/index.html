<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Sweekrit Bhatnagar: Projects</title>
</head>
<body>
    <div class="content">
        <h1 id="projects-title">My Projects</h1>
        <div class="plot-container">
            <svg id="projects-plot" viewBox="-50 -50 100 100"></svg>
            <ul class="legend"></ul>
        </div>
        <div style="height: 2rem;"></div>
        <div class="search-controls">
            <input
                class="searchBar"
                type="search"
                aria-label="Search projects"
                placeholder="Search projects…"
            />
            <button class="clearButton">Clear Filters</button>
        </div>
        <div style="height: 2rem;"></div>
        <div class="projects"></div>
    </div>
</body>
<script type="module" src="./projects.js"></script>
</html>
